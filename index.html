<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="BirdWatcher - Identify birds by photo or sound, track sightings, and learn about pet bird care.">
    <meta name="theme-color" content="#8B5CF6">
    <title>🐦 BirdWatcher - Bird Identification App</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="manifest" href="manifest.json">
    <!-- Icons for offline support -->
    <link rel="icon" type="image/png" sizes="192x192" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><text y='150' font-size='150'>🐦</text></svg>">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><text y='140' font-size='140'>🐦</text></svg>">
</head>
<body>
    <div id="root"></div>

    <!-- React Library (CDN) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

    <!-- App Utils & Hooks -->
    <script src="app.js"></script>

    <!-- Screen Components -->
    <script src="screens-identify.js"></script>
    <script src="screens-other.js"></script>

    <!-- Main App -->
    <script src="main-app.js"></script>

    <!-- Service Worker Registration (Offline Support) -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then((reg) => {
                        console.log('✅ Service Worker registered:', reg.scope);
                    })
                    .catch((err) => {
                        console.log('❌ Service Worker registration failed:', err);
                    });
            });
        }
    </script>
</body>
</html>
